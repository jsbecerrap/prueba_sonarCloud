services:
  db:
    image: postgres:16
    container_name: mundial_db_local
    environment:
      POSTGRES_DB: mundial_2026
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: mundial_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mundial_2026
      SPRING_DATASOURCE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY}
      STRIPE_KEY: ${STRIPE_KEY}
    depends_on:
      - db

  frontend:
    build:
      context: ../../frontend-web/frontend_mundial
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: mundial_frontend
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  pgdata: