spring.application.name=mundial_2026

# === SUPABASE ===
spring.datasource.url=jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.mmwajrypnmwdgbixpdoq
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# === HIKARI OPTIMIZADO ===
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=120000

# === JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# === BATCH OPERATIONS ===
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# === MONITOREO ===
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=INFO
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=200

# === SECRETS ===
jwt.secret=${JWT_SECRET}
api.football.url=https://v3.football.api-sports.io
api.football.key=${API_FOOTBALL_KEY}
stripe.api.key=${STRIPE_KEY}
spring.jackson.time-zone=America/Bogota
server.address=${SERVER_ADDRESS}
server.port=8080