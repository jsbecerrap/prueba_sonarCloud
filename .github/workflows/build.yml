name: SonarQube
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: 21
          distribution: 'zulu'
      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=jsbecerrap_prueba_sonarCloud
          -Dsonar.coverage.exclusions=**/repository/**,**/entity/**,**/dto/**,**/AppConfig.java,**/FireBaseConfig.java,**/RestClientConfig.java,**/Mundial2026Application.java,**/exception/Apuesta*.java,**/exception/Categoria*.java,**/exception/Carrito*.java,**/exception/Codigo*.java,**/exception/Contrasena*.java,**/exception/Correo*.java,**/exception/Cupo*.java,**/exception/Entrada*.java,**/exception/Estado*.java,**/exception/Item*.java,**/exception/Limite*.java,**/exception/MetodoPago*.java,**/exception/Orden*.java,**/exception/Pago*.java,**/exception/Participacion*.java,**/exception/Partido*.java,**/exception/Producto*.java,**/exception/Pronostico*.java,**/exception/Rol*.java,**/exception/Stock*.java,**/exception/Usuario*.java
          -f backend/mundial_2026/pom.xml
          -Dsonar.cpd.exclusions=**/dto/**,**/entity/**

  frontend:
    name: Analyze Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: frontend-web/frontend_mundial